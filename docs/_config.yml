title: go-mx
description: Type-safe, component-based HTML generation for Go — with a shadcn/ui port.
theme: jekyll-theme-cayman
show_downloads: false

# The component gallery under /shadcn/gallery is pre-rendered static HTML
# (committed), regenerated with:
#
#   go run ./cmd/shadcn-gallery -out docs/shadcn/gallery -base /go-mx/shadcn/gallery -static-highlight
#
# -static-highlight bakes the Go syntax highlighting into the HTML (no esm.sh
# CDN fetch at runtime), and -base prefixes every in-gallery link with the
# project-page sub-path. The .github/workflows go.yml "Gallery up to date" job
# runs this exact command and fails if the committed output drifts.
#
# The gallery carries no front matter, so Jekyll copies it through verbatim and
# the Cayman theme layout is not applied to it.
