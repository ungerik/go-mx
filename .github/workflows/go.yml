# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    # go test ./... only covers the current module even in workspace mode, so
    # each nested module needs its own step. The fpdf module carries the
    # byte-parity suite comparing the legacy wrapper against the native pdf
    # package.
    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Test fpdf module (byte-parity suite)
      run: go test -C fpdf -v ./...

    - name: Test wordpress module
      run: go test -C wordpress -v ./...

    - name: Build tools module
      run: go build -C tools ./...

  gallery:
    name: Gallery up to date
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    # Regenerate the committed docs/shadcn/gallery and fail if it drifts from the Go
    # source. Must match the command in docs/_config.yml byte for byte.
    - name: Regenerate gallery
      run: go run ./cmd/shadcn-gallery -out docs/shadcn/gallery -base /go-mx/shadcn/gallery -static-highlight

    - name: Fail if docs/shadcn/gallery is out of date
      run: |
        git add -A docs/shadcn/gallery
        if ! git diff --cached --quiet -- docs/shadcn/gallery; then
          echo "::error::docs/shadcn/gallery is out of date. Regenerate locally and commit:"
          echo "  go run ./cmd/shadcn-gallery -out docs/shadcn/gallery -base /go-mx/shadcn/gallery -static-highlight"
          git diff --cached -- docs/shadcn/gallery
          exit 1
        fi
